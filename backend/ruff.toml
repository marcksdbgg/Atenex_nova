# Ruff configuration for Atenex Nova
line-length = 100
target-version = "py312"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line-length handled by formatter
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
]

[lint.isort]
known-first-party = ["atenex_nova"]

[format]
quote-style = "double"
indent-style = "space"
